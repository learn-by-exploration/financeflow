<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PersonalFi — Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="auth-card">
    <h1>💰 PersonalFi</h1>
    <p id="auth-subtitle">Sign in to manage your finances</p>
    <div id="error-msg" class="error-msg"></div>
    <form id="auth-form">
      <div class="form-group" id="group-display" style="display:none">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <div id="password-requirements" class="password-requirements" style="display:none">
          Password must have:
          <ul>
            <li>At least 8 characters</li>
            <li>An uppercase letter</li>
            <li>A lowercase letter</li>
            <li>A number</li>
            <li>A special character</li>
          </ul>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="auth-btn">Sign In</button>
    </form>
    <div class="toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link" href="#">Register</a>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
