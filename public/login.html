<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceFlow — Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="auth-card">
    <h1>💰 FinanceFlow</h1>
    <p id="auth-subtitle">Your money. Your server. Your rules.</p>
    <div id="error-msg" class="error-msg"></div>
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" role="tab" aria-selected="true" data-mode="login">Sign In</button>
      <button class="auth-tab" role="tab" aria-selected="false" data-mode="register">Register</button>
    </div>
    <form id="auth-form">
      <div class="form-group hidden" id="group-display">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <button type="button" class="password-toggle" aria-label="Show password" tabindex="-1">
            <span class="material-icons-round">visibility</span>
          </button>
        </div>
        <div id="password-requirements" class="password-requirements hidden" aria-live="polite">
          Password must have:
          <ul>
            <li data-rule="length">At least 8 characters</li>
            <li data-rule="upper">An uppercase letter</li>
            <li data-rule="lower">A lowercase letter</li>
            <li data-rule="number">A number</li>
            <li data-rule="special">A special character</li>
          </ul>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="auth-btn">Sign In</button>
    </form>
    <div class="remember-row">
      <label class="remember-label"><input type="checkbox" id="remember-me" checked> Remember me</label>
    </div>
    <button type="button" class="demo-btn" id="demo-btn">Try Demo</button>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
