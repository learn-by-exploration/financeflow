<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceFlow — Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="preload" href="fonts/inter.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/MaterialIconsRound.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
  <div class="auth-card">
    <h1>💰 FinanceFlow</h1>
    <p id="auth-subtitle">Your money. Your server. Your rules.</p>
    <div id="error-msg" class="error-msg"></div>
    <form id="auth-form">
      <div class="form-group" id="group-display" style="display:none">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <button type="button" class="password-toggle" aria-label="Show password" tabindex="-1">
            <span class="material-icons-round" style="font-size:20px">visibility</span>
          </button>
        </div>
        <div id="password-requirements" class="password-requirements" style="display:none" aria-live="polite">
          Password must have:
          <ul>
            <li data-rule="length">At least 8 characters</li>
            <li data-rule="upper">An uppercase letter</li>
            <li data-rule="lower">A lowercase letter</li>
            <li data-rule="number">A number</li>
            <li data-rule="special">A special character</li>
          </ul>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="auth-btn">Sign In</button>
    </form>
    <div class="toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link" href="#">Register</a>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
