services:
  personalfi:
    build: .
    ports:
      - "3457:3457"
    volumes:
      - personalfi-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_DIR=/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  personalfi-data:
