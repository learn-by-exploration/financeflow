services:
  personalfi:
    build: .
    container_name: personalfi
    ports:
      - "3457:3457"
    volumes:
      - personalfi-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_DIR=/app/data
    restart: always
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3457/api/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  personalfi-data:
